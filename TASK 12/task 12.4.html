<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 12.4 — Search & Filter</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        /* ── Tokens ───────────────────────────────────────── */
        :root {
            --bg:        #f9f7f4;
            --surface:   #ffffff;
            --border:    #e8e4de;
            --ink:       #1c1917;
            --muted:     #78716c;
            --muted-lt:  #a8a29e;
            --accent:    #7c3aed;
            --accent-lt: #f5f3ff;
            --danger:    #dc2626;
            --danger-lt: #fee2e2;
            --radius:    14px;
            --shadow:    0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
        }

        /* ── Reset ────────────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 48px 20px 80px;
        }

        /* ── Header ───────────────────────────────────────── */
        header {
            text-align: center;
            margin-bottom: 36px;
        }

        .badge {
            display: inline-block;
            background: var(--accent-lt);
            color: var(--accent);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 100px;
            margin-bottom: 14px;
        }

        h1 {
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 15px;
            color: var(--muted);
        }

        /* ── Controls bar ─────────────────────────────────── */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            max-width: 1160px;
            margin: 0 auto 28px;
        }

        #search {
            flex: 1;
            min-width: 220px;
        }

        input[type="text"],
        select {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 9px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            color: var(--ink);
            background: var(--surface);
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: none;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124,58,237,.1);
        }

        .result-count {
            margin-left: auto;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--muted-lt);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 9px;
            white-space: nowrap;
        }

        /* ── Loading & Error ──────────────────────────────── */
        #loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 60px 0;
            font-size: 15px;
            color: var(--muted);
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #error-msg {
            max-width: 480px;
            margin: 0 auto 28px;
            background: var(--danger-lt);
            border: 1px solid #fca5a5;
            border-radius: var(--radius);
            padding: 14px 18px;
            font-size: 14px;
            color: var(--danger);
            text-align: center;
            display: none;
        }

        /* ── Grid ─────────────────────────────────────────── */
        #users-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 18px;
            max-width: 1160px;
            margin: 0 auto;
        }

        /* ── User Card ────────────────────────────────────── */
        .user-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 24px;
            box-shadow: var(--shadow);
            transition: transform 0.22s ease, box-shadow 0.22s ease;
            animation: cardIn 0.3s ease both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .user-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 12px rgba(0,0,0,.08), 0 12px 32px rgba(0,0,0,.06);
        }

        .user-card h2 {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 12px;
        }

        .user-card p {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 13.5px;
            color: var(--muted);
            margin-bottom: 7px;
            line-height: 1.4;
        }

        .user-card p:last-child { margin-bottom: 0; }

        /* ── Empty state ──────────────────────────────────── */
        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 56px 20px;
            color: var(--muted-lt);
        }

        .empty-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .empty p {
            font-size: 15px;
        }

        /* ── Utility ──────────────────────────────────────── */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="badge">Task 12.4</div>
        <h1>Search &amp; Filter</h1>
        <p class="subtitle">Live search · sort by name · filter by city</p>
    </header>

    <!-- Controls -->
    <div class="controls">
        <input
            type="text"
            id="search"
            placeholder="🔍  Search by name or email…"
        />
        <select id="sort">
            <option value="">Sort: Default</option>
            <option value="az">Name A → Z</option>
            <option value="za">Name Z → A</option>
        </select>
        <select id="city-filter">
            <option value="">All cities</option>
        </select>
        <div class="result-count" id="result-count">— users</div>
    </div>

    <!-- States -->
    <div id="loading">
        <div class="spinner"></div>
        Loading users…
    </div>

    <div id="error-msg"></div>

    <!-- User cards -->
    <div id="users-container"></div>

    <script>
        // ── State ─────────────────────────────────────────────
        let allUsers = [];

        // ── DOM references ────────────────────────────────────
        const searchInput  = document.getElementById("search");
        const sortSelect   = document.getElementById("sort");
        const citySelect   = document.getElementById("city-filter");
        const resultCount  = document.getElementById("result-count");
        const container    = document.getElementById("users-container");
        const loadingEl    = document.getElementById("loading");
        const errorEl      = document.getElementById("error-msg");

        // ── Fetch ─────────────────────────────────────────────

        async function fetchUsers() {
            const response = await fetch("https://jsonplaceholder.typicode.com/users");
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response.json();
        }

        // ── Populate city dropdown dynamically ────────────────

        function populateCityFilter(users) {
            const cities = [...new Set(users.map(u => u.address.city))].sort();
            cities.forEach(city => {
                const option = document.createElement("option");
                option.value       = city;
                option.textContent = city;
                citySelect.appendChild(option);
            });
        }

        // ── Render ────────────────────────────────────────────

        function displayUsers(users) {
            resultCount.textContent = `${users.length} user${users.length !== 1 ? "s" : ""}`;

            if (users.length === 0) {
                container.innerHTML = `
                    <div class="empty">
                        <div class="empty-icon">🔍</div>
                        <p>No users match your search.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = users.map((user, index) => `
                <div class="user-card" style="animation-delay: ${index * 0.04}s">
                    <h2>${user.name}</h2>
                    <p>📧 ${user.email}</p>
                    <p>🏢 ${user.company.name}</p>
                    <p>📍 ${user.address.city}</p>
                </div>
            `).join("");
        }

        // ── Filter + Sort logic ───────────────────────────────

        function applyFilters() {
            const query   = searchInput.value.toLowerCase();
            const sortBy  = sortSelect.value;
            const cityVal = citySelect.value;

            // 1. Search — filter by name or email
            let results = allUsers.filter(user =>
                user.name.toLowerCase().includes(query) ||
                user.email.toLowerCase().includes(query)
            );

            // 2. Filter — by selected city
            if (cityVal) {
                results = results.filter(user => user.address.city === cityVal);
            }

            // 3. Sort — A→Z or Z→A by name
            if (sortBy === "az") {
                results.sort((a, b) => a.name.localeCompare(b.name));
            } else if (sortBy === "za") {
                results.sort((a, b) => b.name.localeCompare(a.name));
            }

            displayUsers(results);
        }

        // ── Initialise ────────────────────────────────────────

        async function init() {
            try {
                allUsers = await fetchUsers();

                populateCityFilter(allUsers);
                displayUsers(allUsers);

                // Attach event listeners after data loads
                searchInput.addEventListener("input",  applyFilters);
                sortSelect.addEventListener("change",  applyFilters);
                citySelect.addEventListener("change",  applyFilters);

            } catch (error) {
                errorEl.textContent = `Error: ${error.message}`;
                errorEl.style.display = "block";
            } finally {
                loadingEl.classList.add("hidden");
            }
        }

        init();
    </script>

</body>
</html>
