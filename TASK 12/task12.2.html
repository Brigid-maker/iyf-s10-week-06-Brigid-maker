<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 12.2 — User Directory</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        /* ── Tokens ───────────────────────────────────────── */
        :root {
            --bg:        #f9f7f4;
            --surface:   #ffffff;
            --border:    #e8e4de;
            --ink:       #1c1917;
            --muted:     #78716c;
            --accent:    #0f766e;
            --accent-lt: #ccfbf1;
            --danger:    #dc2626;
            --danger-lt: #fee2e2;
            --radius:    14px;
            --shadow:    0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
        }

        /* ── Reset ────────────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 48px 20px 80px;
        }

        /* ── Header ───────────────────────────────────────── */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .badge {
            display: inline-block;
            background: var(--accent-lt);
            color: var(--accent);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 100px;
            margin-bottom: 14px;
        }

        h1 {
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--ink);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 15px;
            color: var(--muted);
            font-weight: 400;
        }

        /* ── States ───────────────────────────────────────── */
        #loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 60px 0;
            font-size: 15px;
            color: var(--muted);
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #error {
            max-width: 480px;
            margin: 0 auto 28px;
            background: var(--danger-lt);
            border: 1px solid #fca5a5;
            border-radius: var(--radius);
            padding: 14px 18px;
            font-size: 14px;
            color: var(--danger);
            text-align: center;
        }

        /* ── Grid ─────────────────────────────────────────── */
        #users-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
            max-width: 1160px;
            margin: 0 auto;
        }

        /* ── User Card ────────────────────────────────────── */
        .user-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 24px;
            box-shadow: var(--shadow);
            transition: transform 0.22s ease, box-shadow 0.22s ease;
            animation: cardIn 0.35s ease both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .user-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 12px rgba(0,0,0,.08), 0 12px 32px rgba(0,0,0,.06);
        }

        .user-card h2 {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 12px;
            color: var(--ink);
        }

        .user-card p {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13.5px;
            color: var(--muted);
            margin-bottom: 7px;
            line-height: 1.4;
        }

        .user-card p:last-child { margin-bottom: 0; }

        .user-card p .icon {
            font-size: 14px;
            flex-shrink: 0;
        }

        /* ── Utility ──────────────────────────────────────── */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="app">

        <header>
            <div class="badge">Task 12.2</div>
            <h1>User Directory</h1>
            <p class="subtitle">Fetched live from JSONPlaceholder API</p>
        </header>

        <div id="loading">
            <div class="spinner"></div>
            Loading users…
        </div>

        <div id="error" class="hidden"></div>

        <div id="users-container"></div>

    </div>

    <script>
        // ── DOM references ────────────────────────────────────
        const loading   = document.getElementById("loading");
        const errorDiv  = document.getElementById("error");
        const container = document.getElementById("users-container");

        // ── State helpers ─────────────────────────────────────

        function showLoading() {
            loading.classList.remove("hidden");
            container.innerHTML = "";
            errorDiv.classList.add("hidden");
        }

        function hideLoading() {
            loading.classList.add("hidden");
        }

        function showError(message) {
            errorDiv.textContent = `Error: ${message}`;
            errorDiv.classList.remove("hidden");
        }

        // ── Render ────────────────────────────────────────────

        function displayUsers(users) {
            container.innerHTML = users.map((user, index) => `
                <div class="user-card" style="animation-delay: ${index * 0.05}s">
                    <h2>${user.name}</h2>
                    <p><span class="icon">📧</span>${user.email}</p>
                    <p><span class="icon">🏢</span>${user.company.name}</p>
                    <p><span class="icon">📍</span>${user.address.city}</p>
                </div>
            `).join("");
        }

        // ── Main fetch ────────────────────────────────────────

        async function loadUsers() {
            try {
                showLoading();

                const response = await fetch("https://jsonplaceholder.typicode.com/users");

                if (!response.ok) {
                    throw new Error("Failed to fetch users");
                }

                const users = await response.json();
                displayUsers(users);

            } catch (error) {
                showError(error.message);
            } finally {
                hideLoading(); // always runs — success or failure
            }
        }

        // Initialize on page load
        loadUsers();
    </script>

</body>
</html>
